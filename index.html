<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐈Кто ты сегодня?</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <h1>🐈Кто ты сегодня?</h1>
        
        <div class="wheel-wrapper">
            <div class="wheel" id="wheel">
                <img id="resultImage" src="images/title.jpg" alt="Результат">
            </div>
        </div>

        <button id="spinBtn">Крутить!</button>
        <p id="status">Нажми на кнопку</p>
        <p id="heroDescription" class="hero-description"></p>

        <button id="shareBtn" class="share-btn" style="display:none;">📤 Поделиться результатом</button>
        
        <!-- Список всех участников (для красоты) -->
        <div class="participants">
            <h3>🐾Разгерцовка:</h3>
            <div id="participantList"></div>
        </div>
    </div>

       <!-- ===== ОКОШКО СНИЗУ ===== -->
    <div class="bottom-sheet-overlay" id="bottomSheetOverlay"></div>
    
    <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-content">
            <button class="bottom-sheet-close" id="bottomSheetClose">&times;</button>
            <div class="bottom-sheet-body">
                <div class="bottom-sheet-image">
                    <img id="sheetImage" src="" alt="Фото">
                </div>
                <div class="bottom-sheet-info">
                    <h2 id="sheetName"></h2>
                    <p id="sheetDescription"></p>
                    <div class="bottom-sheet-tags" id="sheetTags"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

    <script src="heroes.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
